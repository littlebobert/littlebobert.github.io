<html lang="ja">

<head>
  <meta charset="utf-8">
  <title>About Justin Garcia</title>

  <meta property="og:title" content="About Justin Garcia" />
  <meta property="og:image" content="assets/headshot-dithered-temp.png" />
</head>

<body>
  <div class="mac-dialog">
    <div class="title-bar">
      <div class="close-box"></div>
      <div class="title-bar-stripes-full"></div>
      <span class="title-text">About this Man</span>
    </div>
    <div class="dialog-content">
      <div class="logo-section">
        <img src="assets/headshot-dithered-temp.png" alt="Task failed successfully" class="logo-img">
        <div class="tagline">Justin Garcia<br><span class="role-label" data-label-ja="シニアソフトウェアエンジニア" data-label-en="Senior Software Engineer">シニアソフトウェアエンジニア</span></div>
      </div>
      <div class="language-switcher">
        <button type="button" id="language-toggle" aria-pressed="false" data-label-ja="English" data-label-en="日本語">English</button>
      </div>
      <div class="info-grid">
        <div class="info-row">
          <span class="info-label" data-label-ja="今の場所:" data-label-en="Location:">今の場所:</span>
          <span class="info-value">Tokyo</span>
        </div>
        <div class="info-row">
          <span class="info-label" data-label-ja="最近の趣味:" data-label-en="Recent hobby:">最近の趣味:</span>
          <span class="info-value"><a href="https://www.strava.com/athletes/148307110">Running and Strava</a></span>
        </div>
        <div class="info-row">
          <span class="info-label" data-label-ja="今の会社のアプリ:" data-label-en="My company's app:">今の会社のアプリ:</span>
          <span class="info-value"><a href="https://apps.apple.com/us/app/kotoba-live-translation/id6740851285">Kotoba Voice Translation</a></span>
        </div>
        <div class="info-divider"></div>
        <div class="info-row">
          <span class="info-label" data-label-ja="ツイッター:" data-label-en="Twitter:">ツイッター:</span>
          <span class="info-value"><a href="https://x.com/_bobertdowney">@_bobertdowney</a></span>
        </div>
        <div class="info-row">
          <span class="info-label" data-label-ja="リンクトイン:" data-label-en="LinkedIn:">リンクトイン:</span>
          <span class="info-value"><a href="https://www.linkedin.com/in/garciajustin/">garciajustin</a></span>
        </div>
        <div class="info-row">
          <span class="info-label" data-label-ja="詳細:" data-label-en="More:">詳細:</span>
          <span class="info-value"><a href="resume.html">Resume</a></span>
        </div>
      </div>
      <div class="memory-bar-section">
        <div class="memory-label">
          <span><strong data-label-ja="最長ラン:" data-label-en="Longest run:">最長ラン:</strong></span>
          <span class="memory-amount">21.1km / 25km</span>
        </div>
        <div class="memory-bar">
          <div class="memory-bar-fill" style="width: 84.4%;"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="clock-row">
    <div class="clock-widget">
      <div class="clock-title-bar">
        <div class="close-box"></div>
        <span class="clock-title">Tokyo</span>
      </div>
      <div class="clock-content">
        <span id="tokyo-hours">--</span>:<span id="tokyo-minutes">--</span><span class="time-separator">:</span><span id="tokyo-seconds">--</span>
      </div>
    </div>
    <div class="clock-widget">
      <div class="clock-title-bar">
        <div class="close-box"></div>
        <span class="clock-title">Tampa</span>
      </div>
      <div class="clock-content">
        <span id="tampa-hours">--</span>:<span id="tampa-minutes">--</span><span class="time-separator">:</span><span id="tampa-seconds">--</span>
      </div>
    </div>
  </div>
  
  <script>
    function timeInZone(date, timeZone) {
      const formatter = new Intl.DateTimeFormat('en-GB', {
        timeZone,
        hour: 'numeric',
        minute: 'numeric',
        second: 'numeric',
        hour12: false,
      });
      const parts = formatter.formatToParts(date);
      const n = (type) => {
        const p = parts.find((x) => x.type === type);
        return p ? String(Number(p.value)).padStart(2, '0') : '00';
      };
      return { h: n('hour'), m: n('minute'), s: n('second') };
    }

    function updateClocks() {
      const now = new Date();

      const tokyo = timeInZone(now, 'Asia/Tokyo');
      document.getElementById('tokyo-hours').textContent = tokyo.h;
      document.getElementById('tokyo-minutes').textContent = tokyo.m;
      document.getElementById('tokyo-seconds').textContent = tokyo.s;

      const tampa = timeInZone(now, 'America/New_York');
      document.getElementById('tampa-hours').textContent = tampa.h;
      document.getElementById('tampa-minutes').textContent = tampa.m;
      document.getElementById('tampa-seconds').textContent = tampa.s;
    }

    const languageToggle = document.getElementById('language-toggle');
    const labelElements = document.querySelectorAll('[data-label-ja][data-label-en]');

    function setLanguage(language) {
      labelElements.forEach((element) => {
        element.textContent = element.dataset[`label${language === 'ja' ? 'Ja' : 'En'}`];
      });
      languageToggle.setAttribute('aria-pressed', language === 'en');
      document.documentElement.lang = language;
    }

    languageToggle.addEventListener('click', () => {
      const nextLanguage = document.documentElement.lang === 'ja' ? 'en' : 'ja';
      setLanguage(nextLanguage);
    });

    document.querySelectorAll('.title-bar, .clock-title-bar').forEach((titleBar) => {
      const windowElement = titleBar.closest('.mac-dialog, .clock-widget');
      if (!windowElement) return;

      titleBar.title = 'Double-click for WindowShade';
      titleBar.addEventListener('dblclick', () => {
        windowElement.classList.toggle('window-shaded');
      });
    });

    setLanguage('ja');
    updateClocks();
    setInterval(updateClocks, 1000);
  </script>
</body>

</html>
