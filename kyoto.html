<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <script src="theme.js"></script>
  <title>Kyoto Community Hack Day</title>
  <link href="style.css?v=104" rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="canonical" href="https://littlebobert.github.io/kyoto.html">
  <meta
    name="description"
    content="Drop your idea for Kyoto community hack day."
  >
  <meta property="og:title" content="Kyoto Community Hack Day">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://littlebobert.github.io/kyoto.html">
  <meta property="og:site_name" content="Kyoto Community Hack Day">
  <meta property="og:description" content="Drop your idea for Kyoto community hack day.">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Kyoto Community Hack Day">
  <meta name="twitter:description" content="Drop your idea for Kyoto community hack day.">
  <style>
    body.kyoto-page {
      justify-content: flex-start;
    }

    .kyoto-desktop {
      max-width: 480px;
    }

    .kyoto-window {
      max-width: 480px;
    }

    .kyoto-content {
      display: grid;
      gap: 16px;
      padding: 24px;
    }

    .kyoto-prompt {
      margin: 0;
      font-size: 28px;
      line-height: 1.1;
      text-align: center;
    }

    .kyoto-signoff {
      margin: -6px 0 0;
      font-size: 18px;
      line-height: 1.1;
      text-align: center;
    }

    .kyoto-actions {
      justify-content: center;
      margin-top: 0;
      padding-top: 0;
    }

    .kyoto-widget-dock {
      width: 100%;
      max-width: 480px;
      margin-top: 12px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .kyoto-widget-dock .clock-widget {
      flex: 0 0 auto;
    }

    .kyoto-widget-dock .appearance-panel {
      width: max-content;
      max-width: calc(100vw - 160px);
    }

    .kyoto-widget-dock .appearance-panel .clock-content {
      align-items: stretch;
    }

    html[lang="ja"] .kyoto-prompt {
      font-size: 21px;
      font-weight: bold;
      line-height: 1.45;
    }

    html[lang="ja"] .kyoto-signoff {
      font-size: 15px;
      font-weight: bold;
      line-height: 1.35;
    }

    html[data-theme="modern"] .kyoto-prompt {
      font-family: inherit;
      font-size: 32px;
      font-weight: 700;
      line-height: 1.08;
      color: rgba(0, 0, 0, 0.88);
    }

    html[data-theme="modern"] .kyoto-signoff {
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      color: rgba(0, 0, 0, 0.55);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    html[lang="ja"][data-theme="modern"] .kyoto-prompt {
      font-size: 24px;
      font-weight: 700;
      line-height: 1.45;
    }

    html[lang="ja"][data-theme="modern"] .kyoto-signoff {
      font-size: 13px;
      letter-spacing: 0;
      text-transform: none;
    }

    @media (max-width: 680px) {
      .kyoto-content {
        padding: 18px 16px;
      }

      .kyoto-prompt {
        font-size: 24px;
      }

      .kyoto-widget-dock {
        position: static;
        display: grid;
        grid-template-columns: max-content minmax(0, 1fr);
        align-items: start;
        gap: 8px;
        width: 100%;
        max-width: 480px;
        margin-top: 12px;
      }

      .kyoto-widget-dock .appearance-panel {
        grid-column: auto;
        justify-self: end;
        max-width: 100%;
      }
    }
  </style>
</head>

<body class="home-page kyoto-page">
  <div class="desktop kyoto-desktop">
    <div class="mac-dialog kyoto-window">
      <div class="title-bar">
        <div class="close-box"></div>
        <div class="title-bar-stripes-full"></div>
        <span
          class="title-text"
          data-label-en="Kyoto"
          data-label-ja="京都"
        >Kyoto</span>
      </div>
      <div class="dialog-content kyoto-content">
        <p
          class="kyoto-prompt"
          data-label-en="What would you make if someone else could build it? Drop your idea &mdash; we&rsquo;ll bring it to life at our monthly meetup."
          data-label-ja="誰かが作ってくれるなら、何を作りたいですか？ アイデアを送ってください。毎月のミートアップで形にします。"
        >What would you make if someone else could build it? Drop your idea &mdash; we&rsquo;ll bring it to life at our monthly meetup.</p>
        <p
          class="kyoto-signoff"
          data-label-en="&mdash; Kyoto community hack day"
          data-label-ja="&mdash; 京都コミュニティハックデー"
        >&mdash; Kyoto community hack day</p>
        <div class="stack-actions kyoto-actions">
          <a
            href="mailto:justin.garcia@gmail.com?subject=Kyoto%20Community%20Hack%20Day%20Idea&body=What%20I%27d%20make%20if%20someone%20else%20could%20build%20it%3A%0A"
            data-label-en="Submit your idea"
            data-label-ja="アイデアを送る"
          >Submit your idea</a>
        </div>
      </div>
    </div>
  </div>

  <div class="kyoto-widget-dock">
    <div class="clock-widget kyoto-clock-widget">
      <div class="clock-title-bar">
        <div class="close-box"></div>
        <span
          class="clock-title"
          data-label-en="Kyoto"
          data-label-ja="京都"
        >Kyoto</span>
      </div>
      <div class="clock-content">
        <div class="digital-clock">
          <span id="kyoto-hours">--</span>:<span id="kyoto-minutes">--</span><span class="time-separator">:</span><span id="kyoto-seconds">--</span>
        </div>
        <div class="analog-clock" aria-hidden="true">
          <span class="analog-mark analog-mark-12">12</span>
          <span class="analog-mark analog-mark-3">3</span>
          <span class="analog-mark analog-mark-6">6</span>
          <span class="analog-mark analog-mark-9">9</span>
          <span class="analog-hand analog-hour" id="kyoto-analog-hour"></span>
          <span class="analog-hand analog-minute" id="kyoto-analog-minute"></span>
          <span class="analog-hand analog-second" id="kyoto-analog-second"></span>
          <span class="analog-pin"></span>
        </div>
        <div class="clock-weather" id="kyoto-weather" aria-live="polite">-</div>
        <div class="weather-attribution">
          <a href="https://open-meteo.com/" data-label-en="Open-Meteo" data-label-ja="Open-Meteo">Open-Meteo</a>
        </div>
      </div>
    </div>

    <div class="clock-widget appearance-panel" id="kyoto-settings">
      <div class="clock-title-bar">
        <div class="close-box"></div>
        <span
          class="clock-title"
          data-label-en="Settings"
          data-label-ja="設定"
        >Settings</span>
      </div>
      <div class="clock-content appearance-content" aria-label="Settings">
        <div class="language-switcher">
          <div class="language-segmented" role="radiogroup" aria-label="Language">
            <button type="button" class="language-segment" data-language-value="en" aria-pressed="false">English</button>
            <button type="button" class="language-segment" data-language-value="ja" aria-pressed="false">日本語</button>
          </div>
        </div>
        <div class="clock-mode-segmented" role="radiogroup" aria-label="Clock display">
          <button type="button" class="clock-mode-segment" data-clock-mode-value="analog" aria-pressed="false">
            <span
              data-label-en="Analog"
              data-label-ja="アナログ"
            >Analog</span>
          </button>
          <button type="button" class="clock-mode-segment" data-clock-mode-value="digital" aria-pressed="false">
            <span
              data-label-en="Digital"
              data-label-ja="デジタル"
            >Digital</span>
          </button>
        </div>
        <div class="weather-unit-segmented" role="radiogroup" aria-label="Weather units">
          <button type="button" class="weather-unit-segment" data-weather-unit-value="metric" aria-pressed="false">
            <span
              data-label-en="Metric"
              data-label-ja="メートル法"
            >Metric</span>
          </button>
          <button type="button" class="weather-unit-segment" data-weather-unit-value="imperial" aria-pressed="false">
            <span
              data-label-en="Imperial"
              data-label-ja="ヤード・ポンド法"
            >Imperial</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="kyoto.js?v=1"></script>
</body>

</html>
